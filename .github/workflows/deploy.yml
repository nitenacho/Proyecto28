name: Build and deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'cms/**'
      - 'README.md'
      - 'DEPLOY.md'
      - 'CHANGELOG.md'
      - 'VERSIONING.md'
      - 'HANDOFF-LATEST.md'
      - 'PLAN-PROYECTO28-V2.md'
      - 'scripts/**'
  workflow_dispatch:

# Opt-in temprano a Node.js 24 para los JS actions (checkout, setup-node,
# configure-pages, upload-pages-artifact, deploy-pages). GitHub forzará
# Node 24 como default el 2026-06-02; este flag silencia los warnings de
# deprecation y nos da los runtimes nuevos ahora. Para revertir si algo
# rompe: poner ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build site
        env:
          # If you set VITE_CMS_URL in repo Settings → Secrets and variables → Actions,
          # the build embeds it. Otherwise the frontend falls back to the static data
          # in src/data/fallback.js.
          VITE_CMS_URL: ${{ secrets.VITE_CMS_URL }}
          # OAuth Client ID (Web Application) creado en console.cloud.google.com.
          # Identifier público — se embeben en el bundle. La whitelist real vive
          # en Strapi /api/auth/check (Etapa 9).
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Make sure CNAME survived the build
        run: |
          if [ ! -f dist/CNAME ]; then
            echo "proyecto28.com" > dist/CNAME
          fi
          ls -la dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
