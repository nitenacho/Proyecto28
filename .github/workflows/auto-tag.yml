name: Auto tag semantic releases

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Create semver tag
    runs-on: ubuntu-latest
    if: |
      startsWith(github.event.head_commit.message, 'feat') ||
      startsWith(github.event.head_commit.message, 'fix')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute next semver
        id: semver
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          set -euo pipefail

          message="$COMMIT_MESSAGE"
          if [[ "$message" == *"[skip-tag]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest" ]]; then
            latest="v0.0.0"
          fi

          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"

          if [[ "$message" == feat* ]]; then
            minor=$((minor + 1))
            patch=0
          elif [[ "$message" == fix* ]]; then
            patch=$((patch + 1))
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          next="v${major}.${minor}.${patch}"
          while git rev-parse "$next" >/dev/null 2>&1; do
            patch=$((patch + 1))
            next="v${major}.${minor}.${patch}"
          done

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.semver.outputs.skip != 'true'
        env:
          TAG: ${{ steps.semver.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG - automated Proyecto28 release"
          git push origin "$TAG"

      - name: Attach Claude Design export to release
        if: steps.semver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ steps.semver.outputs.tag }}
          TAG: ${{ steps.semver.outputs.tag }}
        run: |
          node scripts/export-claude-design.mjs
          zip -r claude-design-export.zip claude-design-export
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" claude-design-export.zip --clobber
          else
            gh release create "$TAG" claude-design-export.zip \
              --title "$TAG" \
              --notes "Proyecto28 automated release with Claude Design token export."
          fi
